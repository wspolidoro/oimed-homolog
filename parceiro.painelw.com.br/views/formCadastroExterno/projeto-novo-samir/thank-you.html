<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Obrigado pelo cadastro</title>
    <link rel="stylesheet" href="/api/js/thank-you.css" />
  </head>
  <body>
    <main class="thank-you-page">
      <section class="thank-you-card">
        <p class="eyebrow">Cadastro concluído</p>
        <h1>Obrigado por se cadastrar!</h1>
        <p class="message">
          Recebemos seus dados e em instantes enviaremos todas as instruções para o e-mail cadastrado.
          Fique de olho na caixa de entrada e também no spam.
        </p>
        <div class="note">Se preferir, acesse o portal Medycco: </div>
        <button class="cta" type="button" onclick="window.location.href='https://medycco.com.br'">Ir para Medycco</button>
      </section>
    </main>
  </body>
</html>
