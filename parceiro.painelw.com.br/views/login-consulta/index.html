<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>



    <style>
        :root {
            --bg-primary: #0f172a;
            --bg-card: #ffffff;
            --bg-page: #f4f6fb;
            --text-muted: #4c5564;
            --accent: #2842c8;
            --radius: 12px;
        }

        * {
            box-sizing: border-box;
        }

        body,
        html {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            font-family: 'Inter', 'Segoe UI', Arial, sans-serif;
            background: var(--bg-page);
            color: #101828;
        }

        .login-shell {
            display: flex;
            min-height: 100vh;
            flex-direction: column;
            width: 100%;
            margin: 0 auto;
        }

        .hero {
            position: relative;
            width: 100%;
            min-height: 280px;
            background-image: linear-gradient(180deg, rgba(5, 10, 20, 0.85), rgba(5, 10, 20, 0.65)),
                url('../../assets/img/foto1.webp');
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: #fff;
            padding: 40px 20px;
            overflow: hidden;
        }

        .hero .overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(180deg, rgba(3, 7, 18, 0.9), rgba(3, 7, 18, 0.5));
            z-index: 0;
        }

        .hero-content {
            max-width: 900px;
            position: relative;
            z-index: 1;
        }

        .hero-content h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 12px;
        }

        .hero-content .sub {
            font-size: 1.1rem;
            margin-bottom: 12px;
            line-height: 1.6;
        }

        .hero-content .small {
            font-size: 0.95rem;
            opacity: 0.9;
            line-height: 1.5;
        }

        .right {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 32px 16px;
            background: var(--bg-page);
        }

        .card {
            width: 100%;
            max-width: 480px;
            background: var(--bg-card);
            border-radius: var(--radius);
            padding: 32px;
            box-shadow: 0 20px 50px rgba(15, 23, 42, 0.12);
        }

        .form-mobile {
            display: none;
            width: 100%;
            background: #fff0;
            padding: 0 16px 24px;
        }

        .form-mobile .card {
            box-shadow: 0 12px 30px rgba(15, 23, 42, 0.2);
            padding: 26px 20px;
            border-radius: 22px;
        }

        .title {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 18px;
        }

        .title svg {
            width: 48px;
            height: 48px;
            color: var(--accent);
        }

        h2,
        h4 {
            margin: 0;
            font-weight: 600;
        }

        h4 {
            color: var(--text-muted);
            font-size: 1rem;
            margin-bottom: 16px;
        }

        .form-group {
            margin-bottom: 18px;
            width: 100%;
        }

        input {
            width: 100%;
            padding: 14px 16px;
            border-radius: 10px;
            border: 1px solid #d9e2ec;
            font-size: 16px;
            background: #f8fafc;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }

        input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(40, 66, 200, 0.15);
        }

        button {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 10px;
            background: var(--accent);
            color: #fff;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            transition: background 0.2s ease, transform 0.2s ease;
        }

        button:hover {
            background: #1f2f92;
            transform: translateY(-1px);
        }

        .spinner svg {
            width: 22px;
            height: 22px;
            display: none;
            animation: spin 1.5s linear infinite;
        }

        @keyframes spin {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }

        .links {
            margin-top: 22px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            font-size: 14px;
            color: var(--text-muted);
        }

        .links a {
            color: var(--text-muted);
            text-decoration: none;
            transition: color 0.2s ease;
        }

        .links a:hover {
            color: var(--accent);
        }

        @media (min-width: 1024px) {
            .login-shell {
                flex-direction: row;
                align-items: stretch;
            }

            .login-shell > .hero {
                flex: 1.1;
                min-height: 100vh;
                padding: 60px;
            }

            .right {
                flex: 1;
                background: linear-gradient(180deg, #f5f5f5, #fefefe);
                display: flex;
            }

            .hero-content h1 {
                font-size: 3.5rem;
            }

            .form-mobile {
                display: none;
            }

            .hero-content .sub {
                font-size: 1.2rem;
            }

            .hero-content .small {
                font-size: 1rem;
            }
        }

        @media (max-width: 768px) {
            .login-shell {
                flex-direction: column;
            }

            .hero {
                min-height: 50vh;
                padding: 48px 24px 28px;
                border-radius: 0;
            }

            .hero-content {
                text-align: center;
            }

            .right {
                padding: 24px 20px 32px;
            }

            .card {
                padding: 26px 20px;
                margin-top: 12px;
            }

            button {
                font-size: 16px;
            }

            .hero-content h1 {
                font-size: 2.4rem;
            }

            .hero-content .sub {
                font-size: 1rem;
            }
            .right {
                display: none;
            }

            .form-mobile {
                display: block;
            }
        }

        @media (max-width: 480px) {
            .hero {
                min-height: 60vh;
                padding: 48px 16px 32px;
                background-position: center 20%;
            }

            .right {
                padding: 18px 16px 32px;
            }

            .card {
                width: 100%;
                max-width: 100%;
                border-radius: 18px;
                box-shadow: 0 12px 30px rgba(15, 23, 42, 0.2);
            }

            .hero-content h1 {
                font-size: clamp(2rem, 7vw, 2.2rem);
                letter-spacing: -0.03em;
            }

            .hero-content .sub,
            .hero-content .small {
                font-size: 0.95rem;
            }
        }
    </style>
</head>

<body>
    <div class="login-shell">
        <section class="hero">
            <div class="overlay"></div>

            <div class="hero-content">
                <h1>Bem-vindo</h1>
                <p class="sub">
                    Sua saúde cuidada com tecnologia, humanização e excelência médica.
                </p>
                <p class="small">
                    Acesse sua conta e tenha controle total sobre seus agendamentos, consultas e histórico médico.
                </p>
            </div>
        </section>

        <section class="right">
            <div class="card">
                <div class="title">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="currentColor" class="bi bi-clipboard2-pulse-fill"
                        viewBox="0 0 16 16">
                        <path
                            d=" M10 .5a.5.5 0 0 0-.5-.5h-3a.5.5 0 0 0-.5.5.5.5 0 0 1-.5.5.5.5 0 0 0-.5.5V2a.5.5 0 0 0 .5.5h5A.5.5 0 0 0 11 2v-.5a.5.5 0 0 0-.5-.5.5.5 0 0 1-.5-.5" />
                        <path
                            d="M4.085 1H3.5A1.5 1.5 0 0 0 2 2.5v12A1.5 1.5 0 0 0 3.5 16h9a1.5 1.5 0 0 0 1.5-1.5v-12A1.5 1.5 0 0 0 12.5 1h-.585q.084.236.085.5V2a1.5 1.5 0 0 1-1.5 1.5h-5A.5.5 0 0 1 4 2v-.5q.001-.264.085-.5M9.98 5.356 11.372 10h.128a.5.5 0 0 1 0 1H11a.5.5 0 0 1-.479-.356l-.94-3.135-1.092 5.096a.5.5 0 0 1-.968.039L6.383 8.85l-.936 1.873A.5.5 0 0 1 5 11h-.5a.5.5 0 0 1 0-1h.191l1.362-2.724a.5.5 0 0 1 .926.08l.94 3.135 1.092-5.096a.5.5 0 0 1 .968-.039Z" />
                    </svg>
                    <h2>Entrar</h2>
                </div>

                <h4>Faça login na sua conta</h4>

                <!-- <form id="form-login" onsubmit="login(event); return false;"> -->
                <form id="form-login" method="POST">

                <div class="form-group">
                    <input type="text" id="form2Example17" name="nuCpf" placeholder="CPF *" required />
                </div>

                <div class="form-group">
                    <input type="password" id="form2Example27" name="password" placeholder="SENHA *" required />
                </div>

                <button type="submit" id="btn-logar">
                    <span class="txt">Entrar agora</span>
                    <span class="spinner">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
                            <path
                                d="M304 48a48 48 0 1 0 -96 0 48 48 0 1 0 96 0zm0 416a48 48 0 1 0 -96 0 48 48 0 1 0 96 0zM48 304a48 48 0 1 0 0-96 48 48 0 1 0 0 96zm464-48a48 48 0 1 0 -96 0 48 48 0 1 0 96 0zM142.9 437A48 48 0 1 0 75 369.1 48 48 0 1 0 142.9 437zm0-294.2A48 48 0 1 0 75 75a48 48 0 1 0 67.9 67.9zM369.1 437A48 48 0 1 0 437 369.1 48 48 0 1 0 369.1 437z" />
                        </svg>
                    </span>
                </button>

                <div class="links">
                    <a href="#">Termos de uso</a>
                    <a href="#">Política de Privacidade</a>
                </div>
                </form>
            </div>
        </section>

        <section class="form-mobile" aria-hidden="true"></section>
    </div>
    <script src="../../config/config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="../../assets/js/login-consulta/index.js"></script>
    <script>
        (function () {
            const mediaQuery = window.matchMedia('(max-width: 768px)');
            const rightSection = document.querySelector('.right');
            const mobileSlot = document.querySelector('.form-mobile');
            const card = rightSection?.querySelector('.card');

            if (!rightSection || !mobileSlot || !card) {
                return;
            }

            const toggleCard = () => {
                const isMobile = mediaQuery.matches;
                if (isMobile) {
                    if (!mobileSlot.contains(card)) {
                        mobileSlot.appendChild(card);
                    }
                    rightSection.style.display = 'none';
                    mobileSlot.style.display = 'block';
                    rightSection.setAttribute('aria-hidden', 'true');
                    mobileSlot.setAttribute('aria-hidden', 'false');
                } else {
                    if (!rightSection.contains(card)) {
                        rightSection.appendChild(card);
                    }
                    rightSection.style.display = '';
                    mobileSlot.style.display = 'none';
                    rightSection.setAttribute('aria-hidden', 'false');
                    mobileSlot.setAttribute('aria-hidden', 'true');
                }
            };

            if (mediaQuery.addEventListener) {
                mediaQuery.addEventListener('change', toggleCard);
            } else {
                mediaQuery.addListener(toggleCard);
            }
            toggleCard();
        })();
    </script>
</body>

</html>
